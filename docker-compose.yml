services:
  habitos-backend:
    build: ./backend
    container_name: habitos-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=https://habitos.xiltepin.me
      - JWT_SECRET=tu_secreto_generado_en_la_torre 
      - DB_PATH=/app/data/habitos.db
    volumes:
      # Mapeo al SSD de la NUC para persistencia fácil
      - ./data:/app/data
    networks:
      - habitos-network

  habitos-frontend:
    build: ./frontend
    container_name: habitos-frontend
    restart: unless-stopped
    ports:
      - "4201:80"
    depends_on:
      - habitos-backend
    networks:
      - habitos-network

networks:
  habitos-network:
    driver: bridge
